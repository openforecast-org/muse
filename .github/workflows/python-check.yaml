name: python-check

on:
  pull_request:
    branches: [main, master]
    # Only run when Python-relevant code changes.  The Python build compiles
    # the shared C++ engine in src/ (plus src/python/musecpp2py.cpp), so any
    # src/ change triggers this check too.
    paths:
      - 'python/**'
      - 'src/**'
      - '.github/workflows/python-check.yaml'
  workflow_dispatch:

permissions: read-all

jobs:
  python-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # Cache the pip download/wheel cache (numpy/scipy/pandas etc.),
          # keyed on the dependency declarations in pyproject.toml.
          cache: pip
          cache-dependency-path: python/pyproject.toml

      # The pybind11 binding compiles the shared C++ engine (../src), which
      # uses Armadillo header-only + LAPACK/BLAS at link time.
      - name: System dependencies (Armadillo + LAPACK/BLAS)
        run: |
          sudo apt-get update
          sudo apt-get install -y libarmadillo-dev liblapack-dev libblas-dev

      # Compiler cache for the Armadillo-heavy engine.  scikit-build-core uses
      # a fresh build dir each run, so CMake's incremental build can't persist;
      # ccache caches at the object level (keyed on preprocessed source) and
      # survives across runs, turning the rebuild into near-instant cache hits.
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-py-ccache

      # Builds _musecore via scikit-build-core + CMake and installs muse.
      # CMAKE_CXX_COMPILER_LAUNCHER=ccache routes every compile through ccache.
      # smooth / greybox are NOT installed: the auto-lambda + accuracy tests
      # skip cleanly, so engine-only functionality is exercised without the
      # sibling (non-PyPI) packages.
      - name: Install muse (ccache-accelerated C++ build)
        run: |
          python -m pip install --upgrade pip
          pip install . --config-settings=cmake.define.CMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Install test tooling
        run: pip install pytest ruff mypy

      - name: Lint (ruff)
        run: ruff check .

      - name: Types (mypy)
        run: mypy

      # Functionality tests only; the R<->Python parity scripts
      # (test_*_parity.py) are excluded via pyproject (addopts +
      # ruff extend-exclude) since they need R and reference dumps.
      - name: Functionality tests
        run: pytest -q
